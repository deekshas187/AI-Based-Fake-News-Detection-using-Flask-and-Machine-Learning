<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#0f172a,#1e293b);
        }

        .container{
            width:90%;
            max-width:700px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#0f172a;
            font-size:40px;
        }

        textarea{
            width:100%;
            height:220px;
            padding:20px;
            border:none;
            outline:none;
            resize:none;
            border-radius:15px;
            background:#f1f5f9;
            font-size:16px;
            line-height:1.6;
        }

        textarea:focus{
            border:2px solid #3b82f6;
            background:white;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
            transform:scale(1.02);
        }

        .result{
            margin-top:25px;
            text-align:center;
            padding:20px;
            border-radius:12px;
            font-size:24px;
            font-weight:bold;
        }

        .fake{
            background:#fee2e2;
            color:#dc2626;
        }

        .real{
            background:#dcfce7;
            color:#16a34a;
        }

        .error{
            background:#fef3c7;
            color:#b45309;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>📰 Fake News Detector</h1>

        <form method="POST">

            <textarea name="news" placeholder="Paste news article here...">{{ news }}</textarea>

            <button type="submit">Detect News</button>

        </form>

        {% if prediction %}

            <div class="result
                {% if prediction == 'Fake News' %}fake
                {% elif prediction == 'Real News' %}real
                {% else %}error
                {% endif %}
            ">

                {{ prediction }}

            </div>

        {% endif %}

    </div>

</body>

</html>
